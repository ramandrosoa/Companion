{% extends "base.html" %}
{% block title %}Companion — Login{% endblock %}
{% block content %}
<div class="card">
  <div class="companion-block">
    <span class="companion-emoji">✨</span>
    <div>
      <div class="companion-name">COMPANION</div>
      <div class="companion-msg">Welcome back. Enter your username or email.</div>
    </div>
  </div>

  {% if error %}
  <div class="feedback show bad" style="margin-bottom:14px;">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="section-label">USERNAME OR EMAIL</div>
    <input type="text" name="identifier" class="type-input"
           placeholder="username or email..."
           autocomplete="off" autofocus>
    <button type="submit" class="btn-submit">LOG IN →</button>
  </form>

  <div style="margin-top:16px; text-align:center;">
    <span style="font-size:0.45rem; color:var(--text3); font-family:var(--font);">
      NO ACCOUNT?
    </span>
    <a href="{{ url_for('signup') }}" class="back-link" style="margin-left:8px;">
      SIGN UP
    </a>
  </div>
</div>
{% endblock %}
